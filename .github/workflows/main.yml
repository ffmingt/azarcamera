name: Build Azar Button

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 修正 1: 安裝 ldid 簽名工具
      # 這是解決 "ldid: command not found" 的關鍵
      - name: Install Dependencies
        run: |
          brew install ldid
          brew install make

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Get iOS SDK
        run: |
          # 清除舊 SDK 避免衝突
          rm -rf $HOME/theos/sdks
          # 下載官方 SDK
          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Build Package
        run: |
          # 開始編譯
          # 這裡會使用剛安裝好的 ldid 進行簽名
          make package FINALPACKAGE=1 TARGET=iphone:clang:16.5:14.0 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload Deb
        uses: actions/upload-artifact@v4
        with:
          name: AzarMagicButton_DEB
          path: packages/*.deb
