name: Build Azar Button

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 修正 1: 安裝 dos2unix 工具
      # 這可以用來把 Windows 格式的檔案轉成 Unix 格式
      - name: Install Dependencies
        run: |
          brew install ldid
          brew install make
          brew install dos2unix

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Get iOS SDK
        run: |
          rm -rf $HOME/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      # 修正 2: 在編譯前，強制修復 control 檔案的格式
      - name: Fix Windows Line Endings
        run: |
          dos2unix control
          dos2unix Makefile
          dos2unix Tweak.x
          dos2unix AzarMagicButton.plist

      - name: Build Package
        run: |
          make package FINALPACKAGE=1 TARGET=iphone:clang:16.5:14.0 THEOS_PACKAGE_SCHEME=rootless

      - name: Upload Deb
        uses: actions/upload-artifact@v4
        with:
          name: AzarMagicButton_DEB
          path: packages/*.deb
